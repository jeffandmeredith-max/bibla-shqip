name: Daily Update

on:
  schedule:
    # 9am Albania time year-round:
    # Winter (Nov-Mar, UTC+1): 08:00 UTC = 9am Albania
    - cron: '0 8 * 1,2,3,11,12 *'
    # Summer (Apr-Oct, UTC+2): 07:00 UTC = 9am Albania
    - cron: '0 7 * 4,5,6,7,8,9,10 *'
  workflow_dispatch: # manual trigger from GitHub UI

jobs:
  update:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
          ref: master

      - uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install yt-dlp, ffmpeg, and Deno
        run: |
          pip3 install -U yt-dlp
          sudo apt-get update -qq && sudo apt-get install -y -qq ffmpeg
          curl -fsSL https://deno.land/install.sh | sh
          echo "$HOME/.deno/bin" >> $GITHUB_PATH

      - name: Write YouTube cookies
        run: printenv COOKIES_RAW > /tmp/cookies.txt
        env:
          COOKIES_RAW: ${{ secrets.COOKIES }}

      - name: Verify cookies file
        run: |
          echo "First line:"
          head -1 /tmp/cookies.txt
          echo "Line count: $(wc -l < /tmp/cookies.txt)"
          echo "File size: $(wc -c < /tmp/cookies.txt)"

      - name: Fetch playlist metadata and update data files
        run: node scripts/fetch-playlist.mjs
        env:
          COOKIES_FILE: /tmp/cookies.txt

      - name: Download audio for any new days
        run: node scripts/download-audio.mjs
        env:
          COOKIES_FILE: /tmp/cookies.txt

      - name: Commit and push any changes
        run: |
          git config user.email "daily-update@github-actions"
          git config user.name "Daily Update"
          git add src/data/ public/audio/
          if git diff --cached --quiet; then
            echo "No changes — everything is up to date."
          else
            git commit -m "chore: daily update $(date +'%Y-%m-%d')"
            git push
            echo "✅ Changes pushed — Netlify will rebuild automatically."
          fi

      - name: Check data integrity
        id: integrity
        run: node scripts/check-integrity.mjs
        continue-on-error: true

      - name: Send alert email if integrity check failed
        if: steps.integrity.outcome == 'failure'
        uses: dawidd6/action-send-mail@v3
        with:
          server_address: smtp.gmail.com
          server_port: 465
          secure: true
          username: ${{ secrets.ALERT_EMAIL_USER }}
          password: ${{ secrets.ALERT_EMAIL_PASS }}
          to: ${{ secrets.ALERT_EMAIL_USER }}
          from: Bibla Shqip Bot <${{ secrets.ALERT_EMAIL_USER }}>
          subject: "⚠️ Bibla Shqip — integrity issues on ${{ github.run_id }}"
          body: |
            The daily update ran but the integrity check found problems.

            ${{ steps.integrity.outputs.stdout }}

            Issues found:
            $(cat integrity-report.txt 2>/dev/null || echo "See workflow logs for details.")

            View the full run:
            https://github.com/${{ github.repository }}/actions/runs/${{ github.run_id }}

      - name: Send alert email if workflow step failed
        if: failure() && steps.integrity.outcome != 'failure'
        uses: dawidd6/action-send-mail@v3
        with:
          server_address: smtp.gmail.com
          server_port: 465
          secure: true
          username: ${{ secrets.ALERT_EMAIL_USER }}
          password: ${{ secrets.ALERT_EMAIL_PASS }}
          to: ${{ secrets.ALERT_EMAIL_USER }}
          from: Bibla Shqip Bot <${{ secrets.ALERT_EMAIL_USER }}>
          subject: "🚨 Bibla Shqip — daily update failed on ${{ github.run_id }}"
          body: |
            The daily update workflow failed during one of its steps.

            View the full run for details:
            https://github.com/${{ github.repository }}/actions/runs/${{ github.run_id }}

      - name: Fail the job if integrity check failed
        if: steps.integrity.outcome == 'failure'
        run: exit 1
