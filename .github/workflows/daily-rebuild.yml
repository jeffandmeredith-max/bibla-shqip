name: Daily Update

on:
  schedule:
    # Run 4x daily to catch videos uploaded at any time of day.
    # Winter (Nov-Mar, UTC+1): Albania = UTC+1
    - cron: '0 8  * 1,2,3,11,12 *'   # 9am  Albania (winter)
    - cron: '0 11 * 1,2,3,11,12 *'   # noon Albania (winter)
    - cron: '0 14 * 1,2,3,11,12 *'   # 3pm  Albania (winter)
    - cron: '0 17 * 1,2,3,11,12 *'   # 6pm  Albania (winter)
    # Summer (Apr-Oct, UTC+2): Albania = UTC+2
    - cron: '0 7  * 4,5,6,7,8,9,10 *'   # 9am  Albania (summer)
    - cron: '0 10 * 4,5,6,7,8,9,10 *'   # noon Albania (summer)
    - cron: '0 13 * 4,5,6,7,8,9,10 *'   # 3pm  Albania (summer)
    - cron: '0 16 * 4,5,6,7,8,9,10 *'   # 6pm  Albania (summer)
  workflow_dispatch: # manual trigger from GitHub UI

jobs:
  update:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
          ref: master

      - uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install yt-dlp, ffmpeg, and Deno
        run: |
          pip3 install -U yt-dlp
          sudo apt-get update -qq && sudo apt-get install -y -qq ffmpeg
          curl -fsSL https://deno.land/install.sh | sh
          echo "$HOME/.deno/bin" >> $GITHUB_PATH

      - name: Write YouTube cookies
        run: printenv COOKIES_RAW > /tmp/cookies.txt
        env:
          COOKIES_RAW: ${{ secrets.COOKIES }}

      - name: Verify cookies file
        run: |
          echo "First line:"
          head -1 /tmp/cookies.txt
          echo "Line count: $(wc -l < /tmp/cookies.txt)"
          echo "File size: $(wc -c < /tmp/cookies.txt)"

      - name: Fetch playlist metadata and update data files
        run: node scripts/fetch-playlist.mjs
        env:
          COOKIES_FILE: /tmp/cookies.txt

      - name: Download audio for any new days
        run: node scripts/download-audio.mjs
        env:
          COOKIES_FILE: /tmp/cookies.txt

      - name: Check data integrity before committing
        run: node scripts/check-integrity.mjs

      - name: Commit and push any changes
        run: |
          git config user.email "daily-update@github-actions"
          git config user.name "Daily Update"
          git add src/data/ public/audio/
          if git diff --cached --quiet; then
            echo "No changes — everything is up to date."
          else
            git commit -m "chore: daily update $(date +'%Y-%m-%d')"
            git push
            echo "✅ Changes pushed — Netlify will rebuild automatically."
          fi
